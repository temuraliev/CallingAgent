<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Звонок – Calling Agent</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="call-page">
    <a href="/" class="back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      Назад к панели
    </a>
    <div class="logo-icon" style="margin:0 auto 1.5rem;width:56px;height:56px;border-radius:16px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
      </svg>
    </div>
    <h1>Голосовой звонок</h1>
    <p class="subtitle">Начните звонок из браузера. Телефон не нужен.</p>
    <div id="setupMsg" class="setup-msg hidden">
      Добавьте <code>VAPI_PUBLIC_API_KEY</code> и <code>VAPI_ASSISTANT_ID</code> в .env и переменные Railway.
      Получить их можно в <a href="https://dashboard.vapi.ai" target="_blank" rel="noopener">VAPI Dashboard</a>.
    </div>
    <p id="readyMsg">Виджет звонка появится ниже. Разрешите доступ к микрофону.</p>
    <p id="syncStatus" class="sync-status hidden"></p>
  </div>

  <script>
    (async function () {
      const res = await fetch('/api/config');
      const { vapiPublicKey, vapiAssistantId } = await res.json();

      if (!vapiPublicKey || !vapiAssistantId) {
        document.getElementById('setupMsg').classList.remove('hidden');
        document.getElementById('readyMsg').classList.add('hidden');
        return;
      }

      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js';
      script.defer = true;
      script.async = true;
      let activeCallId = null;

      script.onload = function () {
        const vapiInstance = window.vapiSDK.run({
          apiKey: vapiPublicKey,
          assistant: vapiAssistantId,
        });

        vapiInstance.on('call-start', (data) => {
          console.log('--- CALL START ---', data);
          activeCallId = pickCallId(data);
          if (activeCallId) console.log('Found Call ID on start:', activeCallId);
        });

        vapiInstance.on('message', (msg) => {
          if (!activeCallId) {
            var id = pickCallId(msg);
            if (id && isValidUuid(id)) {
              activeCallId = String(id);
              console.log('Found Call ID via message:', activeCallId);
            }
          }
        });

        vapiInstance.on('call-end', async (data) => {
          console.log('--- CALL END ---', data);
          var currentId = pickCallId(data);
          var finalId = (currentId && isValidUuid(currentId) ? currentId : null) || (activeCallId && isValidUuid(activeCallId) ? activeCallId : null);
          if (finalId) await triggerSync(finalId);
          else showSyncStatus('Не удалось получить ID звонка. Проверьте консоль (F12).', true);
        });
      };

      function isValidUuid(str) {
        if (typeof str !== 'string' || !str) return false;
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(str.trim());
      }

      function pickCallId(data) {
        if (!data) return null;
        var uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
        function from(obj) {
          if (!obj || typeof obj !== 'object') return null;
          var id = obj.id || obj.callId || obj.call_id;
          if (id && uuidRe.test(String(id))) return String(id);
          if (obj.call) return from(obj.call);
          if (obj.message && obj.message.call) return from(obj.message.call);
          return null;
        }
        var id = from(data) || data.id || data.callId || data.call?.id || data.call?.callId;
        if (id && isValidUuid(String(id))) return String(id);
        function findUuid(obj, depth) {
          if (depth > 5) return null;
          if (!obj || typeof obj !== 'object') return null;
          if (typeof obj === 'string' && uuidRe.test(obj)) return obj;
          for (var key in obj) {
            var v = obj[key];
            if (typeof v === 'string' && uuidRe.test(v)) return v;
            var found = findUuid(v, depth + 1);
            if (found) return found;
          }
          return null;
        }
        return findUuid(data, 0);
      }

      function showSyncStatus(text, isError) {
        const el = document.getElementById('syncStatus');
        if (!el) return;
        el.textContent = text;
        el.className = 'sync-status ' + (isError ? 'sync-status--error' : 'sync-status--ok');
        el.classList.remove('hidden');
      }

      async function triggerSync(callId) {
        var statusEl = document.getElementById('syncStatus');
        try {
          statusEl && statusEl.classList.add('hidden');
          var id = (callId && String(callId).trim()) || '';
          if (!isValidUuid(id)) {
            showSyncStatus('ID звонка не в формате UUID. Не удалось синхронизировать.', true);
            return;
          }
          var sRes = await fetch('/api/sync-call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ callId: id })
          });
          var result = await sRes.json();
          if (sRes.ok && result.success) {
            showSyncStatus('Звонок сохранён. Откройте Dashboard и нажмите «Обновить» (или F5), чтобы увидеть звонок.');
          } else {
            showSyncStatus(result.error || 'Ошибка синхронизации', true);
          }
        } catch (err) {
          console.error('Failed to trigger sync:', err);
          showSyncStatus('Ошибка сети или сервера: ' + (err.message || 'проверьте консоль'), true);
        }
      }
      document.body.appendChild(script);
    })();
  </script>
</body>

</html>
