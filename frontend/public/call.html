<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Звонок – Calling Agent</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="call-page">
    <a href="/" class="back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      Назад к панели
    </a>
    <div class="logo-icon" style="margin:0 auto 1.5rem;width:56px;height:56px;border-radius:16px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
      </svg>
    </div>
    <h1>Голосовой звонок</h1>
    <p class="subtitle">Начните звонок из браузера. Телефон не нужен.</p>
    <div id="setupMsg" class="setup-msg hidden">
      Добавьте <code>VAPI_PUBLIC_API_KEY</code> и <code>VAPI_ASSISTANT_ID</code> в .env и переменные Railway.
      Получить их можно в <a href="https://dashboard.vapi.ai" target="_blank" rel="noopener">VAPI Dashboard</a>.
    </div>
    <p id="readyMsg">Нажмите кнопку ниже и разрешите доступ к микрофону.</p>

    <div id="controls" style="display:flex;flex-direction:column;gap:12px;margin-top:1.5rem;align-items:center;">
      <button id="startBtn" class="primary-btn" disabled>Начать звонок</button>
      <button id="stopBtn" class="primary-btn" style="display:none;background:#dc2626;">Завершить</button>
      <p id="callStatus" class="sync-status hidden"></p>
    </div>
    <p id="syncStatus" class="sync-status hidden"></p>
  </div>

  <script type="module">
    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    const isValidUuid = (s) => typeof s === 'string' && UUID_RE.test(s.trim());

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const setupMsg = document.getElementById('setupMsg');
    const readyMsg = document.getElementById('readyMsg');
    const callStatus = document.getElementById('callStatus');
    const syncStatus = document.getElementById('syncStatus');

    function setStatus(el, text, kind) {
      if (!el) return;
      el.textContent = text;
      el.className = 'sync-status ' + (kind === 'error' ? 'sync-status--error' : 'sync-status--ok');
      el.classList.remove('hidden');
    }

    let vapi = null;
    let activeCallId = null;
    let collectedTranscript = [];
    let callStartedAt = null;

    async function bootstrap() {
      const res = await fetch('/api/config');
      const { vapiPublicKey, vapiAssistantId } = await res.json();

      if (!vapiPublicKey || !vapiAssistantId) {
        setupMsg.classList.remove('hidden');
        readyMsg.classList.add('hidden');
        return;
      }

      let Vapi;
      try {
        Vapi = (await import('https://esm.sh/@vapi-ai/web@2.3.8')).default;
      } catch (err) {
        console.error('Failed to load VAPI SDK:', err);
        setStatus(callStatus, 'Не удалось загрузить VAPI SDK. Проверьте соединение.', 'error');
        return;
      }

      vapi = new Vapi(vapiPublicKey);

      vapi.on('call-start', () => {
        console.log('--- CALL START ---');
        callStartedAt = Date.now();
        collectedTranscript = [];
        startBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';
        setStatus(callStatus, '🎙 Звонок идёт...', 'ok');
      });

      vapi.on('message', (msg) => {
        if (msg?.type === 'transcript' && msg.transcriptType === 'final') {
          const role = msg.role || 'user';
          const text = msg.transcript || msg.text || '';
          if (text.trim()) collectedTranscript.push({ role, message: text });
        }
      });

      vapi.on('error', (err) => {
        console.error('VAPI error:', err);
        setStatus(callStatus, 'Ошибка VAPI: ' + (err?.message || err), 'error');
      });

      vapi.on('call-end', async () => {
        console.log('--- CALL END --- id=', activeCallId);
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        setStatus(callStatus, 'Звонок завершён, синхронизирую...', 'ok');
        const duration = callStartedAt ? Math.round((Date.now() - callStartedAt) / 1000) : 0;
        await triggerSync(activeCallId, duration);
        activeCallId = null;
        callStartedAt = null;
      });

      startBtn.disabled = false;

      startBtn.addEventListener('click', async () => {
        try {
          syncStatus.classList.add('hidden');
          setStatus(callStatus, 'Запускаю звонок...', 'ok');
          const call = await vapi.start(vapiAssistantId);
          // Modern @vapi-ai/web returns the Call object with .id (UUID)
          activeCallId = call?.id || null;
          if (activeCallId) console.log('Call ID:', activeCallId);
        } catch (err) {
          console.error('start() failed:', err);
          setStatus(callStatus, 'Не удалось начать звонок: ' + (err?.message || err), 'error');
          startBtn.style.display = 'inline-block';
          stopBtn.style.display = 'none';
        }
      });

      stopBtn.addEventListener('click', () => {
        try { vapi.stop(); } catch (e) { console.error(e); }
      });
    }

    async function triggerSync(callId, duration) {
      try {
        if (!isValidUuid(callId)) {
          // Server has a fallback path: it will create a stub from client-side data
          console.warn('No UUID — sending client-only data for stub save');
        }
        const body = {
          callId: isValidUuid(callId) ? callId : crypto.randomUUID(),
          duration,
          transcript: collectedTranscript,
          summary: '',
        };
        const res = await fetch('/api/sync-call', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const result = await res.json();
        if (res.ok && result.success) {
          setStatus(syncStatus, '✅ ' + (result.message || 'Звонок сохранён') + '. Откройте Dashboard, чтобы увидеть запись.', 'ok');
        } else {
          setStatus(syncStatus, result.error || 'Ошибка синхронизации', 'error');
        }
      } catch (err) {
        console.error('Failed to trigger sync:', err);
        setStatus(syncStatus, 'Ошибка сети: ' + (err.message || 'проверьте консоль'), 'error');
      }
    }

    bootstrap();
  </script>
</body>

</html>
