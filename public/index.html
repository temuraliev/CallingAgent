<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calling Agent – Панель управления</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>
        <span class="logo-text">Calling Agent</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Панель
        </button>
        <button class="nav-item" data-tab="calls">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Звонки
        </button>
        <a href="/call.html" class="nav-item nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          Позвонить
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/health" class="nav-item nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          Статус
        </a>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title" id="pageTitle">Панель управления</h1>
          <span class="page-subtitle">AI-звонки &middot; Классификация лидов</span>
        </div>
        <div class="topbar-right">
          <form id="outboundForm" class="outbound-form">
            <input type="tel" name="phoneNumber" placeholder="+998 90 123 45 67" required>
            <input type="text" name="customerName" placeholder="Имя">
            <button type="submit" class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
              Позвонить
            </button>
          </form>
        </div>
      </header>

      <section id="tab-dashboard" class="tab-panel active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon total">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="totalCalls">0</span>
              <span class="stat-label">Всего звонков</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon duration">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="totalDuration">0:00</span>
              <span class="stat-label">Общее время</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon hot">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c.3 4-4 6-4 10a6 6 0 0012 0c0-4-4-6-4-10-1 2-3 2-4 0z"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="hotCount">0</span>
              <span class="stat-label">Горячие</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon warm">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="warmCount">0</span>
              <span class="stat-label">Тёплые</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon cold">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2v20"/><path d="M17 7l-5 5-5-5"/><path d="M7 17l5-5 5 5"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="coldCount">0</span>
              <span class="stat-label">Холодные</span>
            </div>
          </div>
        </div>

        <div class="recent-section">
          <h2 class="section-title">Последние звонки</h2>
          <div class="calls-table-wrap">
            <table class="calls-table">
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Тип</th>
                  <th>Лид</th>
                  <th>Длит.</th>
                  <th>Контакт</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody id="dashboardTableBody">
                <tr><td colspan="6" class="empty">Загрузка...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="tab-calls" class="tab-panel">
        <div class="filters-bar">
          <div class="filter-group">
            <label>От</label>
            <input type="date" id="filterFrom">
          </div>
          <div class="filter-group">
            <label>До</label>
            <input type="date" id="filterTo">
          </div>
          <div class="filter-group">
            <label>Статус</label>
            <select id="filterStatus">
              <option value="">Все</option>
              <option value="hot">Горячий</option>
              <option value="warm">Тёплый</option>
              <option value="cold">Холодный</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Тип</label>
            <select id="filterType">
              <option value="">Все</option>
              <option value="inbound">Входящий</option>
              <option value="outbound">Исходящий</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Телефон</label>
            <input type="text" id="filterPhone" placeholder="Поиск...">
          </div>
          <button type="button" id="applyFilters" class="btn btn-secondary">Применить</button>
        </div>
        <div class="calls-table-wrap">
          <table class="calls-table">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Тип</th>
                <th>Лид</th>
                <th>Длит.</th>
                <th>Контакт</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="callsTableBody">
              <tr><td colspan="6" class="empty">Загрузка...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="playbackModal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Запись звонка</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="playbackArea"></div>
    </div>
  </div>

  <div id="detailModal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h3>Детали звонка</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="detailArea"></div>
    </div>
  </div>

  <script>
    const tempLabels = { hot: 'горячий', warm: 'тёплый', cold: 'холодный' };
    const typeLabels = { inbound: 'входящий', outbound: 'исходящий' };

    function formatDuration(sec) {
      if (!sec) return '0:00';
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function formatDurationLong(sec) {
      if (!sec) return '0:00';
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) + ', ' + d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function transcriptToHtml(transcript) {
      if (!transcript || !Array.isArray(transcript) || !transcript.length) return '<p class="empty-text">Транскрипт отсутствует</p>';
      return transcript.map(t => {
        const role = t.role || 'unknown';
        const msg = t.message || t.content || t.text || '';
        if (!msg) return '';
        const roleLabel = role === 'assistant' ? 'Ассистент' : role === 'user' ? 'Клиент' : role;
        const icon = role === 'assistant'
          ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'
          : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
        return `<div class="transcript-msg ${role}"><span class="transcript-role">${icon} ${roleLabel}</span><span class="transcript-text">${msg}</span></div>`;
      }).filter(Boolean).join('');
    }

    let allCalls = [];

    async function loadStats() {
      const params = new URLSearchParams();
      const from = document.getElementById('filterFrom')?.value;
      const to = document.getElementById('filterTo')?.value;
      if (from) params.set('from', from);
      if (to) params.set('to', to);
      const res = await fetch('/api/stats?' + params);
      const stats = await res.json();
      animateValue('totalCalls', stats.totalCalls);
      document.getElementById('totalDuration').textContent = formatDurationLong(stats.totalDurationSeconds);
      animateValue('hotCount', stats.hotCount);
      animateValue('warmCount', stats.warmCount);
      animateValue('coldCount', stats.coldCount);
    }

    function animateValue(id, target) {
      const el = document.getElementById(id);
      const current = parseInt(el.textContent) || 0;
      if (current === target) return;
      el.textContent = target;
      el.classList.add('value-pop');
      setTimeout(() => el.classList.remove('value-pop'), 300);
    }

    function buildCallsParams() {
      const p = new URLSearchParams();
      p.set('limit', '50');
      const from = document.getElementById('filterFrom')?.value;
      const to = document.getElementById('filterTo')?.value;
      const status = document.getElementById('filterStatus')?.value;
      const type = document.getElementById('filterType')?.value;
      const phone = document.getElementById('filterPhone')?.value?.trim();
      if (from) p.set('from', from);
      if (to) p.set('to', to);
      if (status) p.set('status', status);
      if (type) p.set('type', type);
      if (phone) p.set('phone', phone);
      return p;
    }

    async function loadCalls() {
      const params = buildCallsParams();
      const res = await fetch('/api/calls?' + params);
      allCalls = await res.json();
      renderCalls(allCalls, 'callsTableBody');
      renderCalls(allCalls.slice(0, 10), 'dashboardTableBody');
      loadStats();
    }

    function renderCalls(calls, tbodyId) {
      const tbody = document.getElementById(tbodyId);
      if (!calls.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Звонков пока нет</td></tr>';
        return;
      }
      tbody.innerHTML = calls.map(c => {
        const contact = [c.callerName, c.callerPhone].filter(Boolean).join(' · ') || '—';
        const tempKey = c.leadTemperature || 'cold';
        const typeKey = c.callType || 'inbound';
        const playBtn = c.recordingUrl
          ? `<button class="btn btn-icon btn-play" data-url="${c.recordingUrl}" title="Воспроизвести"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>`
          : '';
        return `
          <tr class="call-row">
            <td><span class="cell-date">${formatTime(c.timestamp)}</span></td>
            <td><span class="badge type-${typeKey}">${typeLabels[typeKey] || typeKey}</span></td>
            <td><span class="badge temp-${tempKey}">${tempLabels[tempKey] || tempKey}</span></td>
            <td><span class="cell-duration">${formatDuration(c.duration)}</span></td>
            <td><span class="cell-contact">${contact}</span></td>
            <td class="cell-actions">
              ${playBtn}
              <button class="btn btn-icon btn-details" data-id="${c.callId}" title="Подробнее">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              </button>
            </td>
          </tr>`;
      }).join('');

      tbody.querySelectorAll('.btn-play').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); showPlayback(btn.dataset.url); });
      });
      tbody.querySelectorAll('.btn-details').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); showDetail(btn.dataset.id); });
      });
    }

    function showPlayback(url) {
      const area = document.getElementById('playbackArea');
      area.innerHTML = `<audio src="${url}" controls autoplay style="width:100%"></audio>`;
      openModal('playbackModal');
    }

    function showDetail(callId) {
      const c = allCalls.find(x => x.callId === callId);
      if (!c) return;
      const area = document.getElementById('detailArea');
      const tempKey = c.leadTemperature || 'cold';
      const typeKey = c.callType || 'inbound';
      area.innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><span class="detail-label">Статус</span><span class="badge temp-${tempKey}">${tempLabels[tempKey] || tempKey}</span></div>
          <div class="detail-item"><span class="detail-label">Тип</span><span class="badge type-${typeKey}">${typeLabels[typeKey] || typeKey}</span></div>
          <div class="detail-item"><span class="detail-label">Длительность</span><span>${formatDuration(c.duration)}</span></div>
          <div class="detail-item"><span class="detail-label">Телефон</span><span>${c.callerPhone || '—'}</span></div>
          ${c.callerName ? `<div class="detail-item"><span class="detail-label">Имя</span><span>${c.callerName}</span></div>` : ''}
          ${c.crmId ? `<div class="detail-item"><span class="detail-label">CRM</span><span>${c.crmProvider || 'amo'} #${c.crmId}</span></div>` : ''}
        </div>
        ${c.classificationReason ? `<div class="detail-section"><h4>Причина классификации</h4><p>${c.classificationReason}</p></div>` : ''}
        ${c.summary ? `<div class="detail-section"><h4>Резюме</h4><p>${c.summary}</p></div>` : ''}
        ${Array.isArray(c.interestedActivities) && c.interestedActivities.length ? `<div class="detail-section"><h4>Интересы</h4><div class="tags">${c.interestedActivities.map(a => `<span class="tag">${a}</span>`).join('')}</div></div>` : ''}
        ${c.recordingUrl ? `<div class="detail-section"><h4>Запись</h4><audio src="${c.recordingUrl}" controls style="width:100%"></audio></div>` : ''}
        <div class="detail-section"><h4>Транскрипт</h4><div class="transcript-box">${transcriptToHtml(c.transcript)}</div></div>
      `;
      openModal('detailModal');
    }

    function openModal(id) {
      document.getElementById(id).classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      document.body.style.overflow = '';
      const audio = document.getElementById(id).querySelector('audio');
      if (audio) audio.pause();
    }

    document.querySelectorAll('.modal-close').forEach(btn => {
      btn.addEventListener('click', () => closeModal(btn.closest('.modal').id));
    });
    document.querySelectorAll('.modal-backdrop').forEach(el => {
      el.addEventListener('click', () => closeModal(el.closest('.modal').id));
    });

    document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        item.classList.add('active');
        const tab = item.dataset.tab;
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById('pageTitle').textContent = tab === 'dashboard' ? 'Панель управления' : 'Звонки';
        if (tab === 'calls') loadCalls();
      });
    });

    document.getElementById('applyFilters').addEventListener('click', () => { loadCalls(); });

    document.getElementById('outboundForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.classList.add('loading');
      try {
        const res = await fetch('/api/calls/outbound', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            phoneNumber: form.phoneNumber.value.trim(),
            customerName: form.customerName.value.trim() || undefined,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка');
        showToast(`Звонок запущен: ${data.callId || 'OK'}`, 'success');
        form.reset();
        setTimeout(loadCalls, 3000);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    });

    function showToast(msg, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    loadStats();
    loadCalls();
    setInterval(() => { loadStats(); loadCalls(); }, 15000);
  </script>
</body>
</html>
